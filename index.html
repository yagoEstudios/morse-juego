<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Juego de Morse</title>
<style>
  :root { --bg:#1e1e1e; --fg:#eee; --accent:#4fc3f7; --ok:#66bb6a; --bad:#ef5350; }
  * { box-sizing:border-box; }
  body { font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--fg);
         margin:0; padding:24px; display:flex; justify-content:center; }
  .wrap { width:100%; max-width:640px; }
  h1 { text-align:center; font-size:28px; margin:0 0 4px; }
  .sub { text-align:center; color:#999; margin:0 0 20px; font-size:14px; }
  .panel { background:#262626; border-radius:12px; padding:20px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:#bbb; margin-bottom:6px; }
  input[type=range] { width:100%; }
  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:140px; }
  button { background:var(--accent); color:#06232e; border:none; border-radius:8px;
           padding:12px 18px; font-size:16px; font-weight:bold; cursor:pointer; }
  button:disabled { opacity:.4; cursor:default; }
  button.ghost { background:#3a3a3a; color:var(--fg); }
  .controls { display:flex; gap:10px; justify-content:center; margin:8px 0; flex-wrap:wrap; }
  #answer { width:100%; font-size:22px; padding:12px; border-radius:8px; border:2px solid #444;
            background:#111; color:var(--fg); text-align:center; margin-top:8px; }
  #answer:focus { outline:none; border-color:var(--accent); }
  .timerbar { height:14px; background:#111; border-radius:7px; overflow:hidden; margin:14px 0 4px; }
  .timerfill { height:100%; width:100%; background:var(--accent); transition:width .1s linear; }
  .timetext { text-align:center; font-size:13px; color:#999; }
  .feedback { min-height:48px; text-align:center; font-size:20px; margin-top:10px; }
  .feedback .reveal { color:var(--accent); font-size:24px; letter-spacing:2px; }
  .stats { display:flex; justify-content:space-around; text-align:center; }
  .stats b { display:block; font-size:24px; color:var(--accent); }
  .stats span { font-size:12px; color:#999; }
  .big { font-size:15px; }
  kbd { background:#444; border-radius:4px; padding:1px 6px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Juego de Morse 📡</h1>
  <p class="sub">Escucha el pitido y escribe la frase. <kbd>Enter</kbd> para comprobar.</p>

  <div class="panel">
    <label>Velocidad: <span id="wpmlabel">12</span> PPM (palabras por minuto)</label>
    <input type="range" id="wpm" min="5" max="30" step="1" value="12">
    <div class="row" style="margin-top:8px;color:#777;font-size:12px;">
      <div>← más lento (fácil)</div>
      <div style="text-align:right;">más rápido (difícil) →</div>
    </div>
  </div>

  <div class="panel">
    <div class="timerbar"><div class="timerfill" id="fill"></div></div>
    <div class="timetext" id="timetext">Pulsa Empezar</div>

    <div class="controls">
      <button id="start">▶ Empezar</button>
      <button id="replay" class="ghost" disabled>🔁 Repetir</button>
      <button id="skip" class="ghost" disabled>⏭ Saltar</button>
    </div>

    <input id="answer" placeholder="escribe lo que oigas…" autocomplete="off" disabled>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="panel stats">
    <div><b id="score">0</b><span>aciertos</span></div>
    <div><b id="streak">0</b><span>racha</span></div>
    <div><b id="total">0</b><span>frases</span></div>
  </div>
</div>

<script src="frases.js"></script>
<script>
const MORSE = {
  A:".-",B:"-...",C:"-.-.",D:"-..",E:".",F:"..-.",G:"--.",H:"....",I:"..",
  J:".---",K:"-.-",L:".-..",M:"--",N:"-.","Ñ":"--.--",O:"---",P:".--.",Q:"--.-",
  R:".-.",S:"...",T:"-",U:"..-",V:"...-",W:".--",X:"-..-",Y:"-.--",Z:"--.."
};

// FRASES se carga desde frases.js

// --- normalizacion: acentos fuera, ñ->n, solo letras y espacios ---
function norm(s){
  return s.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[^a-z ]/g,"")
    .replace(/\s+/g," ").trim();
}

// --- Audio Web ---
let ctx;
const FREQ = 600;
function unitSec(){ const wpm = +wpmEl.value; return 1.2 / wpm; } // PARIS standard

function scheduleMorse(text){
  if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==="suspended") ctx.resume();
  const u = unitSec();
  const gain = ctx.createGain();
  gain.gain.value = 0;
  gain.connect(ctx.destination);
  const osc = ctx.createOscillator();
  osc.type = "sine"; osc.frequency.value = FREQ;
  osc.connect(gain);

  let t = ctx.currentTime + 0.15;
  const beep = (dur)=>{ // schedule on/off with tiny fade
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.4, t+0.004);
    gain.gain.setValueAtTime(0.4, t+dur-0.004);
    gain.gain.linearRampToValueAtTime(0, t+dur);
    t += dur;
  };
  const upper = text.toUpperCase();
  for(let i=0;i<upper.length;i++){
    const ch = upper[i];
    if(ch===" "){ t += 7*u; continue; }
    const code = MORSE[ch]; if(!code) continue;
    for(let j=0;j<code.length;j++){
      beep((code[j]==="."?1:3)*u);
      if(j<code.length-1) t += u;        // gap intra-caracter
    }
    // gap inter-caracter (si el siguiente no es espacio ni fin)
    if(i<upper.length-1 && upper[i+1]!==" ") t += 3*u;
  }
  osc.start();
  osc.stop(t+0.05);
  return t - (ctx.currentTime); // duracion total aprox en seg
}

// --- estado del juego ---
const wpmEl=document.getElementById("wpm"), wpmlabel=document.getElementById("wpmlabel");
const startBtn=document.getElementById("start"), replayBtn=document.getElementById("replay"),
      skipBtn=document.getElementById("skip"), answer=document.getElementById("answer"),
      feedback=document.getElementById("feedback"), fill=document.getElementById("fill"),
      timetext=document.getElementById("timetext");
const scoreEl=document.getElementById("score"), streakEl=document.getElementById("streak"),
      totalEl=document.getElementById("total");

let current="", deadline=0, budget=0, rafId=null, playing=false;
let score=0, streak=0, total=0, pool=[];

wpmEl.oninput = ()=> wpmlabel.textContent = wpmEl.value;

function pickFrase(){
  if(pool.length===0) pool = [...FRASES].sort(()=>Math.random()-0.5);
  return pool.pop();
}

function startRound(){
  current = norm(pickFrase());
  const dur = scheduleMorse(current);
  // tiempo para escribir: escala con la velocidad (audio mas largo si va lento)
  // y SIEMPRE un poco mas que lo que dura el audio.
  budget = dur*1.8 + current.length*0.6 + 4;
  deadline = performance.now() + budget*1000;
  playing = true;
  answer.disabled=false; answer.value=""; answer.focus();
  feedback.textContent="";
  replayBtn.disabled=false; skipBtn.disabled=false; startBtn.disabled=true;
  tick();
}

function tick(){
  const left = (deadline - performance.now())/1000;
  const pct = Math.max(0, Math.min(100, left/budget*100));
  fill.style.width = pct+"%";
  fill.style.background = left<budget*0.25 ? "var(--bad)" : "var(--accent)";
  timetext.textContent = left>0 ? left.toFixed(1)+" s" : "¡tiempo!";
  if(left<=0){ endRound(false); return; }
  rafId = requestAnimationFrame(tick);
}

function endRound(success){
  playing=false;
  cancelAnimationFrame(rafId);
  answer.disabled=true;
  total++; totalEl.textContent=total;
  if(success){
    score++; streak++; scoreEl.textContent=score; streakEl.textContent=streak;
    feedback.innerHTML = '<span style="color:var(--ok)">✓ ¡Correcto!</span>';
  } else {
    streak=0; streakEl.textContent=0;
    feedback.innerHTML = '✗ Era: <span class="reveal">'+current+'</span>';
  }
  replayBtn.disabled=true;
  startBtn.disabled=false; startBtn.textContent="▶ Siguiente";
  startBtn.focus();
}

function check(){
  if(!playing) return;
  if(norm(answer.value)===current) endRound(true);
}

startBtn.onclick = startRound;
replayBtn.onclick = ()=>{ if(playing) scheduleMorse(current); };
skipBtn.onclick = ()=>{ if(playing) endRound(false); };
answer.addEventListener("keydown", e=>{ if(e.key==="Enter") check(); });
</script>
</body>
</html>
